name: Patch Morphe

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: |
          npm install
          npx playwright install chromium --with-deps

      - name: Run script
        run: node patch.js

      - name: Get APK file
        id: apk
        run: |
          FILE=$(ls *-patched.apk 2>/dev/null | head -n 1)

          if [ -z "$FILE" ]; then
            echo "No patched APK found"
            ls -la
            exit 1
          fi

          echo "apk=$FILE" >> $GITHUB_OUTPUT

      - name: Normalize APK filename
        id: rename
        run: |
          FILE="${{ steps.apk.outputs.apk }}"
          SAFE_NAME=$(echo "$FILE" | sed 's/[(), ]/_/g')

          mv "$FILE" "$SAFE_NAME"

          echo "apk=$SAFE_NAME" >> $GITHUB_OUTPUT

      - name: Generate tag
        id: tag
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version || '1.0.0')")
          TAG="youtube-${VERSION}-$(date +%s)"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: YouTube Patched APK
          files: ${{ steps.rename.outputs.apk }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload debug
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug
          path: |
            *.log
            *.png
            *.apk

      - name: Delete old releases
        uses: dev-drprasad/delete-older-releases@v0.3.4
        with:
          keep_latest: 1
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 0
          keep_minimum_runs: 1
